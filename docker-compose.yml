version: '3.8'

services:
  # Spring Boot HuggingFace API Service
  huggingface-service:
    build:
      context: .
      dockerfile: backend/spring-huggingface/Dockerfile
    container_name: cosmochat-huggingface
    ports:
      - "8080:8080"
    environment:
      # HuggingFace configuration
      - HF_TOKEN=${HF_TOKEN:-your_hf_token_here}
      - HF_API_BASE_URL=${HF_API_BASE_URL:-https://router.huggingface.co/v1}
      - HF_MODEL_ID=${HF_MODEL_ID:-Qwen/Qwen2.5-Coder-7B-Instruct}
      - HF_NSCALE_SUFFIX=${HF_NSCALE_SUFFIX:-:featherless-ai}
      - SERVER_PORT=8080
    networks:
      - cosmochat-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Python Qwen Coder API (local GGUF model)
  coder-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmochat-coder
    ports:
      - "5001:5001"
    volumes:
      - ./backend/models:/app/backend/models:ro
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - MAX_TOKENS=512
      - TEMPERATURE=0.7
      - LLAMA_THREADS=4
      - LLAMA_GPU_LAYERS=0
      - HOST=0.0.0.0
    networks:
      - cosmochat-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

networks:
  cosmochat-network:
    driver: bridge

