name: Java CI (Desktop + Spring)

on:
  push:
    paths:
      - "src/**"
      - "pom.xml"
      - "lib/**"
      - "javafx/**"
      - "build.ps1"
      - "run-manual.ps1"
      - "backend/spring-huggingface/**"
      - "docker-compose.yml"
      - ".github/workflows/java-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - "lib/**"
      - "javafx/**"
      - "build.ps1"
      - "run-manual.ps1"
      - "backend/spring-huggingface/**"
      - "docker-compose.yml"
      - ".github/workflows/java-ci.yml"

jobs:
  desktop-build:
    name: JavaFX desktop build (manual)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Prepare JavaFX SDK (CI)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $targetDir = "javafx/javafx-sdk-21.0.11"
          $targetLib = Join-Path $targetDir "lib"

          if (Test-Path $targetLib) {
            Write-Host "JavaFX SDK already present at $targetLib"
            exit 0
          }

          New-Item -ItemType Directory -Path "javafx" -Force | Out-Null

          $zipPath = Join-Path $env:RUNNER_TEMP "javafx-sdk.zip"
          $urls = @(
            "https://download2.gluonhq.com/openjfx/21.0.11/openjfx-21.0.11_windows-x64_bin-sdk.zip",
            "https://download.oracle.com/java/21/latest/javafx-21_windows-x64_bin-sdk.zip"
          )

          $downloaded = $false
          foreach ($u in $urls) {
            try {
              Write-Host "Downloading JavaFX SDK: $u"
              Invoke-WebRequest -Uri $u -OutFile $zipPath -UseBasicParsing
              $downloaded = $true
              break
            } catch {
              Write-Host "Failed: $u"
            }
          }

          if (-not $downloaded) {
            throw "Unable to download JavaFX SDK from all sources."
          }

          # Clean any previous extraction
          Get-ChildItem -Path "javafx" -Directory -Filter "javafx-sdk-*" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force

          Expand-Archive -Path $zipPath -DestinationPath "javafx" -Force

          $extracted = Get-ChildItem -Path "javafx" -Directory -Filter "javafx-sdk-*" | Select-Object -First 1
          if (-not $extracted) {
            throw "JavaFX extraction failed: javafx-sdk-* folder not found."
          }

          if (Test-Path $targetDir) {
            Remove-Item $targetDir -Recurse -Force
          }

          Move-Item -Path $extracted.FullName -Destination $targetDir

          if (-not (Test-Path $targetLib)) {
            throw "JavaFX SDK lib not found at $targetLib after setup."
          }

      - name: Compile (no Maven)
        shell: pwsh
        run: ./build.ps1

  spring-huggingface:
    name: Spring HuggingFace Docker build + healthcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -f backend/spring-huggingface/Dockerfile -t cosmochat-huggingface .
      - name: Run container
        run: |
          docker run -d --name cosmochat-hf \
            -e HF_TOKEN=dummy_token_for_ci \
            -p 8080:8080 \
            cosmochat-huggingface
      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          echo "Healthcheck failed"
          docker logs cosmochat-hf
          exit 1
      - name: Stop container
        if: always()
        run: |
          docker rm -f cosmochat-hf || true
